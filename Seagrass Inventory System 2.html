<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#31595B">
<title>Seagrass REALM Inventory</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #52B6AC;
    --dark-teal: #31595B;
    --teal-light: #e8f7f6;
    --teal-mid: #a8ddd9;
    --white: #ffffff;
    --bg: #f4f6f6;
    --surface: #ffffff;
    --border: #e0e8e8;
    --text: #1a2e2e;
    --text-muted: #6b8080;
    --text-hint: #9ab0b0;
    --out-bg: #fff0ee;
    --out-text: #993C1D;
    --out-border: #f5c4b3;
    --in-bg: #e8f7f4;
    --in-text: #0F6E56;
    --in-border: #9fe1cb;
    --partial-bg: #faeeda;
    --partial-text: #854F0B;
    --danger: #E24B4A;
    --radius: 14px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }

  html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom, 16px); }

  /* Header */
  .header { background: var(--dark-teal); padding: 52px 20px 20px; position: sticky; top: 0; z-index: 100; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 0.01em; }
  .header .sub { font-size: 12px; color: var(--teal-mid); margin-top: 1px; }
  .realm-pill { background: rgba(255,255,255,0.15); color: #fff; font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: var(--radius-pill); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; border: 1px solid rgba(255,255,255,0.2); }

  /* Stats */
  .stats-bar { background: var(--dark-teal); padding: 0 20px 16px; display: flex; gap: 10px; }
  .stat { flex: 1; background: rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.12); }
  .stat-num { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: #fff; line-height: 1; }
  .stat-num.out { color: #ffb3a0; }
  .stat-num.in { color: #9fe1cb; }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Scroll */
  .scroll-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 100px; }

  /* Cards */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
  .card-header { padding: 14px 16px 0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .card-body { padding: 12px 16px 16px; }

  /* Scan */
  .scan-btn { width: 100%; height: 56px; background: var(--teal); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; margin-bottom: 10px; }
  .scan-btn:active { background: var(--dark-teal); transform: scale(0.98); }
  .scan-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .or-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .or-divider span { font-size: 12px; color: var(--text-hint); }
  .manual-row { display: flex; gap: 8px; }
  .manual-input { flex: 1; height: 46px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 0 14px; font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; }
  .manual-input:focus { border-color: var(--teal); }
  .manual-input::placeholder { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-hint); }
  .btn-lookup { height: 46px; padding: 0 18px; background: var(--dark-teal); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
  .btn-lookup:active { opacity: 0.8; }

  /* Camera */
  #camera-container { display: none; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 10px; background: #000; }
  #camera-container.active { display: block; }
  #reader { width: 100% !important; }
  #reader video { width: 100% !important; border-radius: 0 !important; }
  #reader img { display: none !important; }
  .camera-hint { text-align: center; font-size: 12px; color: var(--text-muted); padding: 6px 0 0; display: none; }
  .camera-hint.active { display: block; }
  .btn-stop-scan { width: 100%; height: 42px; background: transparent; border: 1.5px solid var(--danger); color: var(--danger); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; display: none; -webkit-tap-highlight-color: transparent; }
  .btn-stop-scan.active { display: block; }

  /* Result */
  .result-panel { display: none; border-radius: var(--radius-sm); padding: 14px; border: 1.5px solid var(--teal); background: var(--teal-light); margin-top: 10px; }
  .result-panel.visible { display: block; }
  .result-panel.error { border-color: var(--danger); background: #fff5f5; }
  .result-item-name { font-size: 17px; font-weight: 600; color: var(--dark-teal); margin-bottom: 4px; }
  .result-panel.error .result-item-name { color: var(--danger); }
  .result-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: var(--radius-pill); background: #fff; border: 1px solid var(--teal-mid); color: var(--dark-teal); font-weight: 500; }
  .result-qty-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .result-qty-label { font-size: 13px; color: var(--text-muted); }
  .result-qty-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--dark-teal); }
  .qty-stepper-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .qty-stepper-row label { font-size: 13px; color: var(--text-muted); flex-shrink: 0; }
  .stepper { display: flex; align-items: center; border: 1px solid var(--teal-mid); border-radius: var(--radius-sm); overflow: hidden; background: #fff; }
  .stepper button { width: 38px; height: 36px; background: none; border: none; font-size: 20px; color: var(--dark-teal); cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; }
  .stepper button:active { background: var(--teal-light); }
  .stepper input { width: 50px; height: 36px; border: none; border-left: 1px solid var(--teal-mid); border-right: 1px solid var(--teal-mid); text-align: center; font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--dark-teal); background: #fff; outline: none; }
  .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-action { height: 52px; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; -webkit-tap-highlight-color: transparent; transition: transform 0.1s, opacity 0.15s; }
  .btn-action:active { transform: scale(0.97); opacity: 0.9; }
  .btn-checkout { background: var(--out-text); color: #fff; }
  .btn-checkin { background: var(--dark-teal); color: #fff; }
  .btn-action svg { width: 18px; height: 18px; }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom, 0px); max-width: 480px; margin: 0 auto; }
  .nav-btn { flex: 1; padding: 10px 0 12px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-hint); font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500; -webkit-tap-highlight-color: transparent; transition: color 0.15s; letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.active { color: var(--dark-teal); }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Inventory list */
  .search-filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .search-filter-row input, .search-filter-row select { height: 40px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--surface); outline: none; }
  .search-filter-row input { flex: 1; min-width: 0; }
  .search-filter-row select { min-width: 0; font-size: 12px; }

  /* Swipeable inventory item */
  .inv-item-wrapper { position: relative; margin-bottom: 8px; border-radius: var(--radius); overflow: hidden; }
  .inv-item-delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--danger); display: flex; align-items: center; justify-content: center; border-radius: var(--radius); }
  .inv-item-delete-bg svg { width: 22px; height: 22px; stroke: #fff; }
  .inv-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: relative; transition: transform 0.2s ease; touch-action: pan-y; will-change: transform; }
  .inv-item-left { flex: 1; min-width: 0; }
  .inv-item-name { font-weight: 600; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inv-item-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  .inv-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-hint); }
  .inv-cat { font-size: 10px; padding: 2px 7px; border-radius: var(--radius-pill); background: var(--teal-light); color: var(--dark-teal); font-weight: 500; }
  .inv-item-right { text-align: right; flex-shrink: 0; }
  .inv-qty { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--dark-teal); line-height: 1; }
  .inv-qty-total { font-size: 12px; color: var(--text-hint); }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
  .status-in-dot { background: #1D9E75; }
  .status-out-dot { background: var(--danger); }
  .status-partial-dot { background: #EF9F27; }
  .status-text { font-size: 11px; font-weight: 500; margin-top: 2px; }
  .status-in-text { color: var(--in-text); }
  .status-out-text { color: var(--out-text); }
  .status-partial-text { color: var(--partial-text); }

  /* Log */
  .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px; display: flex; gap: 12px; align-items: center; }
  .log-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .log-icon.out { background: var(--out-bg); }
  .log-icon.in { background: var(--in-bg); }
  .log-icon svg { width: 16px; height: 16px; }
  .log-icon.out svg { stroke: var(--out-text); }
  .log-icon.in svg { stroke: var(--in-text); }
  .log-info { flex: 1; min-width: 0; }
  .log-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-detail { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .log-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-hint); flex-shrink: 0; text-align: right; }

  /* Add item form */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input, .form-select { width: 100%; height: 46px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus { border-color: var(--teal); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-submit { width: 100%; height: 52px; background: var(--dark-teal); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s, transform 0.1s; }
  .btn-submit:active { opacity: 0.85; transform: scale(0.99); }

  /* Categories manager */
  .cat-list { margin-bottom: 16px; }
  .cat-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 7px; }
  .cat-row-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .cat-row-count { font-size: 12px; color: var(--text-hint); font-family: 'DM Mono', monospace; margin-right: 8px; }
  .btn-cat-delete { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-hint); -webkit-tap-highlight-color: transparent; display: flex; align-items: center; border-radius: 50%; transition: background 0.15s, color 0.15s; }
  .btn-cat-delete:hover { background: #fff0ee; color: var(--danger); }
  .btn-cat-delete svg { width: 18px; height: 18px; }
  .add-cat-row { display: flex; gap: 8px; }
  .add-cat-input { flex: 1; height: 46px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 0 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; }
  .add-cat-input:focus { border-color: var(--teal); }
  .add-cat-input::placeholder { color: var(--text-hint); }
  .btn-add-cat { height: 46px; padding: 0 18px; background: var(--teal); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .btn-add-cat:active { background: var(--dark-teal); }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; margin-top: 4px; }

  /* Confirm modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; align-items: flex-end; justify-content: center; padding-bottom: env(safe-area-inset-bottom, 16px); }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px 20px; width: 100%; max-width: 480px; }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .modal-body { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-modal-cancel { height: 48px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; color: var(--text); -webkit-tap-highlight-color: transparent; }
  .btn-modal-confirm { height: 48px; background: var(--danger); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; color: #fff; -webkit-tap-highlight-color: transparent; }

  /* Empty */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty svg { width: 40px; height: 40px; stroke: var(--teal-mid); margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--dark-teal); color: #fff; padding: 12px 22px; border-radius: var(--radius-pill); font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 999; white-space: nowrap; pointer-events: none; max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--teal-mid); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-inner">
      <div>
        <h1>REALM Inventory</h1>
        <div class="sub">Seagrass · powered by Octo</div>
      </div>
      <span class="realm-pill">SEAGRASS</span>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Items</div></div>
    <div class="stat"><div class="stat-num in" id="s-in">0</div><div class="stat-label">In Storage</div></div>
    <div class="stat"><div class="stat-num out" id="s-out">0</div><div class="stat-label">Checked Out</div></div>
  </div>

  <div class="scroll-content">

    <!-- SCAN -->
    <div id="panel-scan" class="panel active">
      <div class="card">
        <div class="card-header">Scan Item</div>
        <div class="card-body">
          <button class="scan-btn" id="btn-open-camera" onclick="startCamera()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            Scan with Camera
          </button>
          <div id="camera-container"><div id="reader"></div></div>
          <div class="camera-hint" id="camera-hint">Point camera at barcode or QR code</div>
          <button class="btn-stop-scan" id="btn-stop-scan" onclick="stopCamera()">✕ Stop Camera</button>
          <div class="or-divider"><span>or enter manually</span></div>
          <div class="manual-row">
            <input class="manual-input" id="manual-input" placeholder="Type barcode ID (e.g. SG-001)" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
            <button class="btn-lookup" onclick="lookupItem(document.getElementById('manual-input').value)">Look up</button>
          </div>
          <div class="result-panel" id="result-panel">
            <div class="result-item-name" id="res-name"></div>
            <div class="result-chips" id="res-chips"></div>
            <div class="result-qty-row">
              <span class="result-qty-label">In storage</span>
              <span class="result-qty-val" id="res-qty"></span>
            </div>
            <div class="qty-stepper-row">
              <label>Quantity</label>
              <div class="stepper">
                <button onclick="adjustQty(-1)">−</button>
                <input type="number" id="action-qty" value="1" min="1" />
                <button onclick="adjustQty(1)">+</button>
              </div>
            </div>
            <div class="action-btns">
              <button class="btn-action btn-checkout" onclick="doAction('out')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                Check Out
              </button>
              <button class="btn-action btn-checkin" onclick="doAction('in')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Check In
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- INVENTORY -->
    <div id="panel-inventory" class="panel">
      <div class="search-filter-row">
        <input type="search" id="inv-search" placeholder="Search items..." oninput="renderInventory()" />
        <select id="inv-cat" onchange="renderInventory()"><option value="">All categories</option></select>
        <select id="inv-status" onchange="renderInventory()">
          <option value="">All</option>
          <option value="in">In Storage</option>
          <option value="partial">Partial</option>
          <option value="out">Out</option>
        </select>
      </div>
      <div id="inv-list"></div>
    </div>

    <!-- LOG -->
    <div id="panel-log" class="panel">
      <div id="log-list"></div>
    </div>

    <!-- ADD ITEM -->
    <div id="panel-add" class="panel">
      <div class="card">
        <div class="card-header">Add New Item</div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Barcode ID</label>
              <input class="form-input" id="new-id" placeholder="e.g. SG-011" autocapitalize="characters" autocorrect="off" />
            </div>
            <div class="form-group">
              <label class="form-label">Total Qty</label>
              <input class="form-input" id="new-qty" type="number" value="1" min="1" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Item Name</label>
            <input class="form-input" id="new-name" placeholder="e.g. Puzzle Lock Box" />
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="new-cat"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Description (optional)</label>
            <input class="form-input" id="new-desc" placeholder="Notes about this item" />
          </div>
          <button class="btn-submit" onclick="addItem()">Add to Inventory</button>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="panel-settings" class="panel">
      <div class="card">
        <div class="card-header">Manage Categories</div>
        <div class="card-body">
          <div class="section-label">Current Categories</div>
          <div class="cat-list" id="cat-list"></div>
          <div class="section-label">Add New Category</div>
          <div class="add-cat-row">
            <input class="add-cat-input" id="new-cat-input" placeholder="Category name..." />
            <button class="btn-add-cat" onclick="addCategory()">Add</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-scan" onclick="switchPanel('scan',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h.01M18 14h.01M14 18h.01M18 18h.01"/></svg>
    Scan
  </button>
  <button class="nav-btn" id="nav-inventory" onclick="switchPanel('inventory',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    Inventory
  </button>
  <button class="nav-btn" id="nav-log" onclick="switchPanel('log',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Log
  </button>
  <button class="nav-btn" id="nav-add" onclick="switchPanel('add',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Add Item
  </button>
  <button class="nav-btn" id="nav-settings" onclick="switchPanel('settings',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </button>
</div>

<!-- Confirm modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Are you sure?</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-confirm" id="modal-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let categories = [
  "BM&P","Vital","Architype","Whitemore",
  "Technology","Props","Costumes","Furniture",
  "Consumables","Games and Puzzles","Artifacts"
];

let inventory = [
  {id:"SG-001",name:"Clue Envelope Set",cat:"BM&P",desc:"Sealed envelopes with REALM clues",total:20,qty:20},
  {id:"SG-002",name:"Bluetooth Speaker",cat:"Technology",desc:"JBL Flip 5 — ambient sound",total:3,qty:3},
  {id:"SG-003",name:"Detective Costume Kit",cat:"Costumes",desc:"Hats, badges, trench coats",total:10,qty:10},
  {id:"SG-004",name:"Puzzle Lock Box",cat:"Games and Puzzles",desc:"Combination lock boxes",total:6,qty:6},
  {id:"SG-005",name:"Folding Table 6ft",cat:"Furniture",desc:"For staging and set design",total:4,qty:4},
  {id:"SG-006",name:"Name Badge Holders",cat:"Consumables",desc:"Lanyard + badge sleeve sets",total:100,qty:100},
  {id:"SG-007",name:"Portable LED Light Kit",cat:"Technology",desc:"Color-changing LED strips",total:5,qty:5},
  {id:"SG-008",name:"Classified Folder Set",cat:"Vital",desc:"Red CLASSIFIED stamp folders",total:30,qty:30},
  {id:"SG-009",name:"Actor Prop Phone",cat:"Props",desc:"Burner-style flip phones",total:4,qty:4},
  {id:"SG-010",name:"Ancient Artifact Replica",cat:"Artifacts",desc:"Decorative scene-setting piece",total:3,qty:3},
];

let activityLog = [];
let currentItem = null;
let html5QrCode = null;
let cameraRunning = false;
let pendingConfirm = null;

/* ── Helpers ── */
function getStatus(item) {
  if (item.qty === 0) return "out";
  if (item.qty < item.total) return "partial";
  return "in";
}

function updateStats() {
  document.getElementById("s-total").textContent = inventory.length;
  document.getElementById("s-in").textContent = inventory.filter(i => getStatus(i) === "in").length;
  document.getElementById("s-out").textContent = inventory.filter(i => getStatus(i) !== "in").length;
}

/* ── Category dropdowns ── */
function refreshCategoryDropdowns() {
  ["inv-cat","new-cat"].forEach(id => {
    const sel = document.getElementById(id);
    const prev = sel.value;
    const isFilter = id === "inv-cat";
    sel.innerHTML = isFilter ? '<option value="">All categories</option>' : '';
    categories.forEach(cat => {
      const o = document.createElement("option");
      o.value = cat; o.textContent = cat;
      sel.appendChild(o);
    });
    if (prev) sel.value = prev;
  });
}

/* ── Camera ── */
function startCamera() {
  document.getElementById("camera-container").classList.add("active");
  document.getElementById("camera-hint").classList.add("active");
  document.getElementById("btn-stop-scan").classList.add("active");
  document.getElementById("btn-open-camera").style.display = "none";
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 240, height: 180 } },
    (decoded) => { stopCamera(); document.getElementById("manual-input").value = decoded; lookupItem(decoded); },
    () => {}
  ).catch(() => { showToast("Camera access denied", true); stopCamera(); });
  cameraRunning = true;
}

function stopCamera() {
  if (html5QrCode && cameraRunning) { html5QrCode.stop().catch(()=>{}); html5QrCode = null; cameraRunning = false; }
  document.getElementById("camera-container").classList.remove("active");
  document.getElementById("camera-hint").classList.remove("active");
  document.getElementById("btn-stop-scan").classList.remove("active");
  document.getElementById("btn-open-camera").style.display = "";
}

/* ── Scan / lookup ── */
function lookupItem(raw) {
  if (!raw) return;
  const query = raw.trim().toUpperCase();
  const panel = document.getElementById("result-panel");
  const item = inventory.find(i => i.id.toUpperCase() === query);
  if (!item) {
    panel.className = "result-panel visible error";
    document.getElementById("res-name").textContent = `"${raw}" not found`;
    document.getElementById("res-chips").innerHTML = `<span class="chip" style="border-color:#f09595;color:var(--danger)">Check ID and try again</span>`;
    document.getElementById("res-qty").textContent = "";
    currentItem = null; return;
  }
  currentItem = item;
  panel.className = "result-panel visible";
  document.getElementById("res-name").textContent = item.name;
  document.getElementById("res-chips").innerHTML = `<span class="chip">${item.id}</span><span class="chip">${item.cat}</span>`;
  document.getElementById("res-qty").textContent = `${item.qty} / ${item.total}`;
  document.getElementById("action-qty").value = 1;
  document.getElementById("action-qty").max = item.total;
}

function adjustQty(delta) {
  const input = document.getElementById("action-qty");
  const max = currentItem ? currentItem.total : 999;
  input.value = Math.max(1, Math.min(max, (parseInt(input.value) || 1) + delta));
}

function doAction(action) {
  if (!currentItem) return;
  const qty = parseInt(document.getElementById("action-qty").value) || 1;
  if (action === "out") {
    if (qty > currentItem.qty) { showToast(`Only ${currentItem.qty} available`, true); return; }
    currentItem.qty -= qty;
  } else {
    const canReturn = currentItem.total - currentItem.qty;
    if (qty > canReturn) { showToast(`Can only return up to ${canReturn}`, true); return; }
    currentItem.qty += qty;
  }
  const now = new Date();
  activityLog.push({ id: currentItem.id, name: currentItem.name, action, qty, after: currentItem.qty,
    time: now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
    date: now.toLocaleDateString([],{month:"short",day:"numeric"}) });
  document.getElementById("res-qty").textContent = `${currentItem.qty} / ${currentItem.total}`;
  updateStats(); renderInventory(); renderLog();
  showToast(`${qty}× ${currentItem.name} ${action === "out" ? "checked out ✓" : "checked in ✓"}`);
}

/* ── Inventory render + swipe-to-delete ── */
function renderInventory() {
  const search = (document.getElementById("inv-search").value || "").toLowerCase();
  const cat = document.getElementById("inv-cat").value;
  const status = document.getElementById("inv-status").value;
  const list = document.getElementById("inv-list");

  const filtered = inventory.filter(i =>
    (i.name.toLowerCase().includes(search) || i.id.toLowerCase().includes(search)) &&
    (!cat || i.cat === cat) &&
    (!status || getStatus(i) === status)
  );

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><p>No items found</p></div>`;
    return;
  }

  const sm = { in:{dot:"status-in-dot",text:"status-in-text",label:"In Storage"}, partial:{dot:"status-partial-dot",text:"status-partial-text",label:"Partial"}, out:{dot:"status-out-dot",text:"status-out-text",label:"Out"} };

  list.innerHTML = filtered.map(item => {
    const s = getStatus(item); const m = sm[s];
    return `
      <div class="inv-item-wrapper" id="wrap-${item.id}">
        <div class="inv-item-delete-bg">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </div>
        <div class="inv-item" id="item-${item.id}" data-id="${item.id}">
          <div class="inv-item-left">
            <div class="inv-item-name">${item.name}</div>
            <div class="inv-item-meta">
              <span class="inv-id">${item.id}</span>
              <span class="inv-cat">${item.cat}</span>
            </div>
          </div>
          <div class="inv-item-right">
            <div class="inv-qty">${item.qty}<span class="inv-qty-total">/${item.total}</span></div>
            <div class="status-text ${m.text}"><span class="status-dot ${m.dot}"></span>${m.label}</div>
          </div>
        </div>
      </div>`;
  }).join("");

  filtered.forEach(item => attachSwipe(item.id));
}

function attachSwipe(id) {
  const el = document.getElementById(`item-${id}`);
  if (!el) return;
  let startX = 0, currentX = 0, swiping = false, revealed = false;
  const THRESHOLD = 60;

  el.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    swiping = true;
    el.style.transition = "none";
  }, {passive: true});

  el.addEventListener("touchmove", e => {
    if (!swiping) return;
    currentX = e.touches[0].clientX - startX;
    if (currentX > 0 && !revealed) { currentX = 0; return; }
    if (revealed) currentX = Math.min(0, currentX - THRESHOLD);
    const clamp = Math.max(-80, Math.min(0, currentX));
    el.style.transform = `translateX(${clamp}px)`;
  }, {passive: true});

  el.addEventListener("touchend", () => {
    swiping = false;
    el.style.transition = "transform 0.2s ease";
    if (currentX < -THRESHOLD) {
      el.style.transform = "translateX(-80px)";
      revealed = true;
    } else {
      el.style.transform = "translateX(0)";
      revealed = false;
    }
  });

  el.addEventListener("click", () => {
    if (revealed) {
      el.style.transition = "transform 0.2s ease";
      el.style.transform = "translateX(0)";
      revealed = false;
      const item = inventory.find(i => i.id === id);
      confirmDelete("item", id, `Remove "${item ? item.name : id}" from inventory?`, `This item and all its data will be deleted. This cannot be undone.`);
    }
  });
}

/* ── Delete item ── */
function confirmDelete(type, id, title, body) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").textContent = body;
  document.getElementById("modal-confirm-btn").textContent = "Delete";
  pendingConfirm = { type, id };
  document.getElementById("modal-overlay").classList.add("show");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("show");
  pendingConfirm = null;
  document.querySelectorAll(".inv-item").forEach(el => {
    el.style.transition = "transform 0.2s ease";
    el.style.transform = "translateX(0)";
  });
}

document.getElementById("modal-confirm-btn").addEventListener("click", () => {
  if (!pendingConfirm) return;
  if (pendingConfirm.type === "item") {
    const idx = inventory.findIndex(i => i.id === pendingConfirm.id);
    const name = idx >= 0 ? inventory[idx].name : "";
    if (idx >= 0) inventory.splice(idx, 1);
    if (currentItem && currentItem.id === pendingConfirm.id) {
      currentItem = null;
      document.getElementById("result-panel").className = "result-panel";
    }
    updateStats(); renderInventory();
    showToast(`${name} removed`);
  } else if (pendingConfirm.type === "category") {
    const catName = pendingConfirm.id;
    categories = categories.filter(c => c !== catName);
    refreshCategoryDropdowns(); renderCategories(); renderInventory();
    showToast(`"${catName}" removed`);
  }
  closeModal();
});

/* ── Log render ── */
function renderLog() {
  const list = document.getElementById("log-list");
  if (!activityLog.length) {
    list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No activity yet</p></div>`;
    return;
  }
  list.innerHTML = [...activityLog].reverse().map(e => `
    <div class="log-entry">
      <div class="log-icon ${e.action}">
        ${e.action==="out"
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>`}
      </div>
      <div class="log-info">
        <div class="log-name">${e.name}</div>
        <div class="log-detail">${e.action==="out"?"Checked out":"Checked in"} · Qty ${e.qty} · Now: ${e.after} in storage</div>
      </div>
      <div class="log-time">${e.date}<br>${e.time}</div>
    </div>`).join("");
}

/* ── Add item ── */
function addItem() {
  const id = (document.getElementById("new-id").value||"").trim().toUpperCase();
  const name = (document.getElementById("new-name").value||"").trim();
  const cat = document.getElementById("new-cat").value;
  const qty = parseInt(document.getElementById("new-qty").value)||1;
  const desc = (document.getElementById("new-desc").value||"").trim();
  if (!id||!name||!cat) { showToast("Fill in ID, name, and category", true); return; }
  if (inventory.find(i=>i.id===id)) { showToast("Barcode ID already exists", true); return; }
  inventory.push({id,name,cat,desc,total:qty,qty});
  ["new-id","new-name","new-desc"].forEach(i => document.getElementById(i).value="");
  document.getElementById("new-qty").value=1;
  updateStats(); renderInventory();
  showToast(`${name} added ✓`);
  switchPanel("inventory", document.getElementById("nav-inventory"));
}

/* ── Categories panel ── */
function renderCategories() {
  const list = document.getElementById("cat-list");
  if (!categories.length) {
    list.innerHTML = `<div style="font-size:13px;color:var(--text-hint);padding:8px 0">No categories yet — add one below</div>`;
    return;
  }
  list.innerHTML = categories.map(cat => {
    const count = inventory.filter(i => i.cat === cat).length;
    return `
      <div class="cat-row">
        <span class="cat-row-name">${cat}</span>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="cat-row-count">${count} item${count !== 1 ? "s" : ""}</span>
          <button class="btn-cat-delete" onclick="promptDeleteCategory('${cat.replace(/'/g, "\\'")}')" title="Remove category">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </button>
        </div>
      </div>`;
  }).join("");
}

function addCategory() {
  const input = document.getElementById("new-cat-input");
  const name = input.value.trim();
  if (!name) { showToast("Enter a category name", true); return; }
  if (categories.find(c => c.toLowerCase() === name.toLowerCase())) { showToast("Category already exists", true); return; }
  categories.push(name);
  input.value = "";
  refreshCategoryDropdowns(); renderCategories();
  showToast(`"${name}" added ✓`);
}

function promptDeleteCategory(cat) {
  const count = inventory.filter(i => i.cat === cat).length;
  const body = count > 0
    ? `This will remove the "${cat}" category. The ${count} item${count!==1?"s":""} in this category will keep their category label but it won't appear in dropdowns.`
    : `Remove the "${cat}" category? It has no items assigned to it.`;
  confirmDelete("category", cat, `Remove "${cat}"?`, body);
}

/* ── Panel switching ── */
function switchPanel(name, btn) {
  stopCamera();
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`panel-${name}`).classList.add("active");
  btn.classList.add("active");
  if (name === "settings") renderCategories();
}

/* ── Toast ── */
function showToast(msg, isError=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show${isError?" error":""}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = `toast${isError?" error":""}`; }, 2600);
}

/* ── Keyboard ── */
document.getElementById("manual-input").addEventListener("keydown", e => { if (e.key==="Enter") lookupItem(e.target.value); });
document.getElementById("new-cat-input").addEventListener("keydown", e => { if (e.key==="Enter") addCategory(); });
document.getElementById("modal-overlay").addEventListener("click", e => { if (e.target === document.getElementById("modal-overlay")) closeModal(); });

/* ── Init ── */
refreshCategoryDropdowns();
updateStats();
renderInventory();
renderLog();
</script>
</body>
